      (function () {
        const root = document.documentElement;
        const switcher = document.querySelector(".lang-switch");
        const options = switcher.querySelectorAll(".lang-option");
        const headerEls = {
          i18n: document.querySelectorAll("[data-i18n]"),
          html: document.querySelectorAll("[data-i18n-html]"),
        };

        // 设备语言检测：zh-CN / zh-TW / zh-HK / zh-Hans / zh-Hant 等一律视为中文，
        // 其余一律英文。localStorage 只在用户点击切换按钮后写入，
        // 这样设备语言变化后下一次访问能被正确感知。
        function detectLang() {
          const saved = localStorage.getItem("sql2er-lang");
          if (saved === "zh" || saved === "en") return saved;
          const list =
            navigator.languages && navigator.languages.length
              ? navigator.languages
              : [navigator.language || "en"];
          return list.some((l) => (l || "").toLowerCase().startsWith("zh"))
            ? "zh"
            : "en";
        }

        function applyHeader(lang) {
          const dict = window.SQL2ER_I18N[lang];
          headerEls.i18n.forEach((el) => {
            const k = el.getAttribute("data-i18n");
            if (dict[k] !== undefined) el.textContent = dict[k];
          });
          headerEls.html.forEach((el) => {
            const k = el.getAttribute("data-i18n-html");
            if (dict[k] !== undefined) el.innerHTML = dict[k];
          });
          document.title = dict.pageTitle;
          root.setAttribute("lang", lang === "zh" ? "zh-CN" : "en");
          switcher.setAttribute("data-lang", lang);
          options.forEach((btn) => {
            const active = btn.getAttribute("data-lang") === lang;
            btn.classList.toggle("is-active", active);
            btn.setAttribute("aria-selected", active ? "true" : "false");
          });
        }

        function setLang(lang, opts) {
          const initial = opts && opts.initial;
          if (initial) {
            applyHeader(lang);
            // 初始自动检测不写入 localStorage，保留给用户点击切换时使用，
            // 避免把设备语言锁死在首次访问的那次结果上。
            window.dispatchEvent(
              new CustomEvent("sql2er-lang", {
                detail: { lang, initial: true },
              }),
            );
            return;
          }
          if (
            document.documentElement.getAttribute("lang") &&
            (document.documentElement.getAttribute("lang").startsWith("zh")
              ? "zh"
              : "en") === lang
          ) {
            return;
          }
          document.body.classList.add("is-lang-fading");
          localStorage.setItem("sql2er-lang", lang);
          setTimeout(() => {
            applyHeader(lang);
            window.dispatchEvent(
              new CustomEvent("sql2er-lang", { detail: { lang } }),
            );
            requestAnimationFrame(() => {
              document.body.classList.remove("is-lang-fading");
            });
          }, 200);
        }

        options.forEach((btn) => {
          btn.addEventListener("click", () => {
            setLang(btn.getAttribute("data-lang"));
          });
        });

        window.SQL2ER_setLang = setLang;
        window.SQL2ER_currentLang = detectLang();
        setLang(window.SQL2ER_currentLang, { initial: true });
      })();

    <!-- Main Application Script -->
    <script type="text/babel">
      window.addEventListener("load", () => {
        const { useState, useEffect, useRef } = React;
        const { Switch } = window.antd;
        const G6 = window.G6;

        // 注册 G6 自定义节点（entity, attribute, relationship）
        window.ERBuilder.registerCustomNodes(G6);

        // 从 ERBuilder 模块获取函数
        const generateChenModelData = window.ERBuilder.generateChenModelData;
        const buildAttributeData = window.ERBuilder.buildAttributeData;
        const estimateAttributeHalfSize =
          window.ERBuilder.estimateAttributeHalfSize;
        const patchRelationshipLinkPoints =
          window.ERBuilder.patchRelationshipLinkPoints;

        // 从 Layout 模块获取布局函数
        const {
          smoothFitView,
          animateNodesToTargets,
          deterministicHash,
          deterministicRandom,
          applyInitialComponentPositions,
          spreadDisconnectedComponents,
          forceAlignLayout,
          arrangeLayout,
        } = window.Layout;

        // 从 Editor 模块获取 CodeEditor 组件
        const CodeEditor = window.Editor.createCodeEditorComponent(React);

        // ─────────────────────────────────────────────────────────
        // HistoryOverlay：滑动卡片形式展示生成历史
        // 实现思路对齐 example.jsx：3D 透视轨道 + 拖拽/滚轮滚动 + 吸附阻力。
        //  - targetScroll 是吸附目标位置（整数）；currentScroll 用 lerp 追赶
        //  - 焦点卡片 shift→1，被抽离到右侧；其余卡片保持轨道侧 -55° 旋转
        // ─────────────────────────────────────────────────────────
        const HistoryOverlay = ({
          open,
          items,
          t,
          onClose,
          onRestore,
          onDelete,
          formatTimestamp,
        }) => {
          const trackRef = useRef(null);
          const cardRefs = useRef([]);
          const stateRef = useRef({
            targetScroll: 0,
            currentScroll: 0,
            isDragging: false,
            startX: 0,
            startScroll: 0,
            velocity: 0,
            lastX: 0,
            wheelTimeout: null,
            shiftValues: [],
            // 本次按下后是否真的发生了拖动；用来抑制 pointerup 之后那次
            // "幽灵 click" —— 否则在聚焦卡上拖完一松手就会被当成点击恢复。
            didDrag: false,
          });
          const [hintVisible, setHintVisible] = useState(true);
          const [focusIdx, setFocusIdx] = useState(0);
          // { [snap.id]: number }，背景图 Y 方向偏移百分比（0 = 顶，50 = 视觉居中）
          // 数据驱动：图越扁，缩略图被 contain 缩到的高度越小，下方留白越多，
          // 完全靠顶看起来"飘"。把空白按比例分给上方，瘦高图直接 0%（本身就铺满）。
          const [thumbY, setThumbY] = useState({});

          // 列表变化或重新打开时，重置滚动到第 0 张
          useEffect(() => {
            if (!open) return;
            const s = stateRef.current;
            s.targetScroll = 0;
            s.currentScroll = 0;
            s.shiftValues = items.map(() => 0);
            setFocusIdx(0);
            setHintVisible(true);
          }, [open, items.length]);

          // 测量每张快照的宽高比，算出该张缩略图应有的 Y 偏移
          useEffect(() => {
            if (!open) return;
            let cancelled = false;
            // 卡片尺寸需与 .history-card 的 CSS 保持一致
            const isMobile = window.innerWidth < 768;
            const cardW = isMobile ? 260 : 320;
            const cardH = isMobile ? 360 : 420;
            // .history-card-thumb 的 inset: 18px 16px 38% 16px
            const thumbW = cardW - 32;
            const thumbH = cardH - 18 - cardH * 0.38;
            const containerRatio = thumbW / thumbH;

            items.forEach((snap) => {
              if (!snap || !snap.thumbnail) return;
              const img = new Image();
              img.onload = () => {
                if (cancelled) return;
                const iw = img.naturalWidth;
                const ih = img.naturalHeight;
                if (!iw || !ih) return;
                const imageRatio = iw / ih;
                // imageRatio <= containerRatio → 图相对更高，contain 后会铺满
                // 容器高度，Y 偏移没有意义；只对更扁的图做下移
                const emptyFrac = Math.max(0, 1 - containerRatio / imageRatio);
                // 系数 55 让中等扁的图（如 16:9）偏下大约 1/4，
                // 极扁的图（≥3:1）顶到 50% 即视觉居中，不再继续下沉
                const y = Math.min(50, emptyFrac * 55);
                setThumbY((prev) => {
                  if (Math.abs((prev[snap.id] || 0) - y) < 0.5) return prev;
                  return { ...prev, [snap.id]: y };
                });
              };
              img.src = snap.thumbnail;
            });
            return () => {
              cancelled = true;
            };
          }, [open, items.length]);

          useEffect(() => {
            if (!open) return;
            const container = trackRef.current;
            if (!container) return;
            const total = items.length;
            if (total === 0) return;

            const handlePointerDown = (e) => {
              if (e.pointerType === "mouse" && e.button !== 0) return;
              // 卡内的按钮 / 链接 / 输入控件按下时不进入拖拽模式：
              // 否则原生 click 还没派发，targetScroll 已经在 pointermove 里被改动，
              // 视觉吸附会"吃掉"用户的点击。
              const tgt = e.target;
              if (
                tgt &&
                tgt.closest &&
                tgt.closest(
                  "button, a, input, select, textarea, [data-no-drag]",
                )
              ) {
                return;
              }
              const s = stateRef.current;
              s.isDragging = true;
              s.didDrag = false;
              s.startX = e.clientX;
              s.startScroll = s.targetScroll;
              s.velocity = 0;
              s.lastX = s.startX;
              setHintVisible(false);
              container.classList.add("is-dragging");
            };

            const handlePointerMove = (e) => {
              const s = stateRef.current;
              if (!s.isDragging) return;
              if (e.pointerType === "mouse" && e.buttons === 0) {
                handlePointerUp();
                return;
              }
              const currentX = e.clientX;
              const deltaX = currentX - s.startX;
              // 4px 阈值过滤掉鼠标抖动 / 触控板微小漂移
              if (!s.didDrag && Math.abs(deltaX) > 4) s.didDrag = true;
              s.targetScroll = s.startScroll - deltaX * 0.006;
              s.targetScroll = Math.max(
                -0.5,
                Math.min(total - 0.5, s.targetScroll),
              );
              s.velocity = currentX - s.lastX;
              s.lastX = currentX;
            };

            const handlePointerUp = () => {
              const s = stateRef.current;
              if (!s.isDragging) return;
              s.isDragging = false;
              container.classList.remove("is-dragging");
              let projected = s.targetScroll - s.velocity * 0.02;
              const baseIndex = Math.round(s.startScroll);
              const diff = projected - baseIndex;
              let finalTarget;
              if (Math.abs(diff) < 0.6) {
                finalTarget = baseIndex;
              } else {
                finalTarget = Math.round(projected);
              }
              s.targetScroll = Math.max(0, Math.min(total - 1, finalTarget));
            };

            const handleWheel = (e) => {
              e.preventDefault();
              const s = stateRef.current;
              s.targetScroll += e.deltaY * 0.003;
              s.targetScroll = Math.max(0, Math.min(total - 1, s.targetScroll));
              if (s.wheelTimeout) clearTimeout(s.wheelTimeout);
              s.isDragging = true;
              s.wheelTimeout = setTimeout(() => {
                s.isDragging = false;
                s.targetScroll = Math.round(s.targetScroll);
              }, 150);
              setHintVisible(false);
            };

            container.addEventListener("pointerdown", handlePointerDown);
            window.addEventListener("pointermove", handlePointerMove);
            window.addEventListener("pointerup", handlePointerUp);
            container.addEventListener("wheel", handleWheel, {
              passive: false,
            });

            let raf;
            const loop = () => {
              const s = stateRef.current;
              const isMobile = window.innerWidth < 768;
              s.currentScroll += (s.targetScroll - s.currentScroll) * 0.08;

              const focusedIndex = Math.round(s.targetScroll);
              if (focusedIndex !== focusIdx) setFocusIdx(focusedIndex);

              for (let i = 0; i < total; i++) {
                const rel = i - s.currentScroll;
                const distanceToFocus = Math.abs(i - s.targetScroll);
                const highlight = Math.max(0, 1 - distanceToFocus * 1.0);

                const isTarget =
                  !s.isDragging && Math.round(s.targetScroll) === i;
                const isCloseEnough = Math.abs(rel) < 0.6;
                // 静止吸附时聚焦卡 shift→1 完全抽离；
                // 拖动时给最近的卡一个 0~0.55 的部分抬起，按 highlight 平滑过渡，
                // 这样手在动的过程中也能看到当前会停在哪张卡片上。
                let shiftTarget = isTarget && isCloseEnough ? 1 : 0;
                if (s.isDragging) {
                  shiftTarget = Math.max(shiftTarget, highlight * 0.4);
                }
                if (s.shiftValues[i] === undefined) s.shiftValues[i] = 0;
                s.shiftValues[i] += (shiftTarget - s.shiftValues[i]) * 0.1;
                const shift = s.shiftValues[i];

                const highlightOffsetX = highlight * (isMobile ? 40 : 80);
                const highlightRotY = highlight * 15;

                const trackX =
                  (isMobile ? -80 : -window.innerWidth * 0.18) +
                  highlightOffsetX;
                const trackY = 0;
                const trackZ = -rel * (isMobile ? 320 : 550);
                // 把轨道侧基础旋转从 -55° 收一点到 -42°，
                // 让非焦点卡也能稍微正对屏幕，缩略图内容更易辨识
                const trackRotY = -42 + highlightRotY;

                const activeX = isMobile ? 0 : window.innerWidth * 0.15;
                const activeY = 0;
                const activeZ = 120;
                const activeRotY = 0;

                const x = trackX + (activeX - trackX) * shift;
                const y = trackY + (activeY - trackY) * shift;
                const z = trackZ + (activeZ - trackZ) * shift;
                const rotY = trackRotY + (activeRotY - trackRotY) * shift;
                const scale = 0.75 + 0.4 * shift;

                let opacity = 1;
                if (rel > 5) opacity = Math.max(0, 1 - (rel - 5) * 0.5);
                if (rel < -3) opacity = Math.max(0, 1 + (rel + 3) * 0.5);

                const el = cardRefs.current[i];
                if (el) {
                  el.style.transform = `translate3d(-50%, -50%, 0) translateX(${x}px) translateY(${y}px) translateZ(${z}px) rotateY(${rotY}deg) scale(${scale})`;
                  el.style.opacity = opacity;
                  el.style.zIndex = Math.round(
                    1000 - Math.abs(rel) * 10 + shift * 100,
                  );
                  el.style.setProperty("--shift", String(shift));
                }
              }

              raf = requestAnimationFrame(loop);
            };
            loop();

            return () => {
              container.removeEventListener("pointerdown", handlePointerDown);
              window.removeEventListener("pointermove", handlePointerMove);
              window.removeEventListener("pointerup", handlePointerUp);
              container.removeEventListener("wheel", handleWheel);
              cancelAnimationFrame(raf);
              if (stateRef.current.wheelTimeout) {
                clearTimeout(stateRef.current.wheelTimeout);
              }
            };
          }, [open, items.length]);

          const focusOn = (i) => {
            const s = stateRef.current;
            s.targetScroll = i;
            setHintVisible(false);
          };

          const handleCardClick = (i) => {
            // 拖动结束时浏览器仍会派发一次 click，吞掉它，避免在聚焦卡上
            // 一拖一松就触发恢复
            const s = stateRef.current;
            if (s.didDrag) {
              s.didDrag = false;
              return;
            }
            // 不是焦点卡：先吸附过去；已是焦点卡：执行恢复
            if (i !== focusIdx) {
              focusOn(i);
              return;
            }
            const snap = items[i];
            if (snap) onRestore(snap);
          };

          return (
            <div className={`history-overlay${open ? " is-open" : ""}`}>
              <div className="history-header">
                <i className="fa-solid fa-clock-rotate-left"></i>
                <span>{t.historyTitle}</span>
                {items.length > 0 && (
                  <span className="history-count">· {items.length}</span>
                )}
              </div>
              <button
                type="button"
                className="history-close"
                onClick={onClose}
                aria-label={t.historyClose}
                title={t.historyClose}
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <line x1="18" x2="6" y1="6" y2="18" />
                  <line x1="6" x2="18" y1="6" y2="18" />
                </svg>
              </button>

              {items.length === 0 ? (
                <div className="history-empty">
                  <div className="history-empty-card">
                    <div className="history-empty-icon-wrap">
                      <i className="fa-solid fa-clock-rotate-left"></i>
                    </div>
                    <div className="history-empty-title">{t.historyEmpty}</div>
                    <div className="history-empty-hint">
                      {t.historyEmptyHint}
                    </div>
                  </div>
                </div>
              ) : (
                <>
                  <div ref={trackRef} className="history-track">
                    {items.map((snap, i) => {
                      const entityCount = (snap.nodes || []).filter(
                        (n) =>
                          typeof n.id === "string" &&
                          n.id.indexOf("entity-") === 0,
                      ).length;
                      const tags = [];
                      tags.push(
                        snap.isColored ? t.historyColored : t.historyMono,
                      );
                      if (snap.hideFields) tags.push(t.historyAttrsHidden);
                      if (snap.showComment) tags.push(t.historyComment);
                      tags.push(`${entityCount} ${t.historyEntities}`);
                      return (
                        <div
                          key={snap.id}
                          ref={(el) => (cardRefs.current[i] = el)}
                          className="history-card"
                          onClick={(e) => {
                            e.stopPropagation();
                            handleCardClick(i);
                          }}
                          style={{ cursor: "pointer" }}
                        >
                          {snap.thumbnail ? (
                            <div
                              className="history-card-thumb"
                              style={{
                                backgroundImage: `url(${snap.thumbnail})`,
                                backgroundPosition: `center ${thumbY[snap.id] || 0}%`,
                              }}
                            />
                          ) : (
                            <div className="history-card-thumb is-empty">
                              <i className="fa-solid fa-diagram-project"></i>
                            </div>
                          )}
                          <div className="history-card-track-overlay" />
                          <div className="history-card-shade" />
                          <div className="history-card-meta">
                            <span className="history-card-eyebrow">
                              {formatTimestamp(snap.updatedAt)}
                            </span>
                            <div className="history-card-tags">
                              {tags.map((tg, k) => (
                                <span key={k}>{tg}</span>
                              ))}
                            </div>
                            <div className="history-card-actions">
                              <button
                                type="button"
                                className="history-card-restore"
                                onClick={(e) => {
                                  e.stopPropagation();
                                  onRestore(snap);
                                }}
                              >
                                <i className="fa-solid fa-rotate-left"></i>
                                {t.historyRestore}
                              </button>
                              <button
                                type="button"
                                className="history-card-delete"
                                onClick={(e) => {
                                  e.stopPropagation();
                                  onDelete(snap.id);
                                }}
                              >
                                <i className="fa-solid fa-trash"></i>
                                {t.historyDelete}
                              </button>
                            </div>
                          </div>
                          <div className="history-card-frame" />
                        </div>
                      );
                    })}
                  </div>
                  <div
                    className="history-hint"
                    style={{ opacity: hintVisible ? 1 : 0 }}
                  >
                    <i className="fa-solid fa-arrows-left-right"></i>
                    <span>{t.historyHint}</span>
                  </div>
                </>
              )}
            </div>
          );
        };

        const App = () => {
          const I18N = window.SQL2ER_I18N;
          const [lang, setLang] = useState(
            () => window.SQL2ER_currentLang || "zh",
          );
          const t = I18N[lang];
          const [showBackground, setShowBackground] = useState(true);
          const [inputText, setInputText] = useState(
            () => I18N[window.SQL2ER_currentLang || "zh"].sample,
          );
          const [isColored, setIsColored] = useState(true);
          const [showComment, setShowComment] = useState(false);
          const [hideFields, setHideFields] = useState(false);
          const [error, setError] = useState(null);
          const [loading, setLoading] = useState(false);
          const [hasGraph, setHasGraph] = useState(false);
          const lastInputRef = useRef(""); // 记录上次生成时的输入
          const tablesDataRef = useRef(null); // 最近一次生成所用的 tables 数据
          const containerRef = useRef(null);
          const graphRef = useRef(null);
          // 撤销/重做管理器：每次重新生成图后清空历史
          const historyRef = useRef(window.History.createManager());
          // 历史快照面板状态
          const [historyOpen, setHistoryOpen] = useState(false);
          const [historyItems, setHistoryItems] = useState([]);
          // 恢复快照时用于压制 showComment / hideFields / isColored 的 useEffect
          // 让它们看到状态值与"已应用值"一致从而跳过自动重新生成。
          const appliedShowCommentRef = useRef(showComment);
          const appliedHideFieldsRef = useRef(hideFields);
          const appliedIsColoredRef = useRef(isColored);
          // 上一次 saveSnapshotForCurrentGraph 投递的延迟保存定时器
          const pendingSaveTimerRef = useRef(null);

          // 更新图表样式
          const updateGraphStyles = (graphInstance, colored) => {
            if (!graphInstance || graphInstance.destroyed) return;

            graphInstance.setAutoPaint(false);

            const nodes = graphInstance.getNodes();
            nodes.forEach((node) => {
              const model = node.getModel();
              const styles = {};

              if (colored) {
                if (model.nodeType === "entity") {
                  if (model.isPlaceholder) {
                    // Placeholder entity: same blue theme but dashed border
                    styles.style = {
                      fill: "#e0f2fe",
                      stroke: "#0ea5e9",
                      lineWidth: 2,
                      lineDash: [4, 4],
                      shadowColor: "rgba(14, 165, 233, 0.2)",
                      shadowBlur: 10,
                    };
                    styles.labelCfg = {
                      style: {
                        fill: "#0f172a",
                        fontWeight: "700",
                        fontFamily: "Poppins",
                        fontStyle: "italic",
                      },
                    };
                  } else {
                    // Sky Blue theme
                    styles.style = {
                      fill: "#e0f2fe",
                      stroke: "#0ea5e9",
                      lineWidth: 2,
                      shadowColor: "rgba(14, 165, 233, 0.2)",
                      shadowBlur: 10,
                    };
                    styles.labelCfg = {
                      style: {
                        fill: "#0f172a",
                        fontWeight: "700",
                        fontFamily: "Poppins",
                      },
                    };
                  }
                } else if (model.nodeType === "relationship") {
                  // Violet theme
                  styles.style = {
                    fill: "#f5f3ff",
                    stroke: "#8b5cf6",
                    lineWidth: 2,
                    shadowColor: "rgba(139, 92, 246, 0.2)",
                    shadowBlur: 10,
                  };
                  styles.labelCfg = {
                    style: { fill: "#0f172a", fontFamily: "Poppins" },
                  };
                } else if (model.nodeType === "attribute") {
                  if (model.keyType === "pk") {
                    // Emerald theme
                    styles.style = {
                      fill: "#ecfdf5",
                      stroke: "#10b981",
                      lineWidth: 2,
                      shadowColor: "rgba(16, 185, 129, 0.2)",
                      shadowBlur: 5,
                    };
                    styles.labelCfg = {
                      style: {
                        fill: "#0f172a",
                        fontWeight: "700",
                        fontFamily: "Poppins",
                      },
                    };
                  } else {
                    // Slate theme
                    styles.style = {
                      fill: "#ffffff",
                      stroke: "#94a3b8", // Slate 400
                      lineWidth: 2,
                    };
                    styles.labelCfg = {
                      style: {
                        fill: "#475569",
                        fontWeight: "normal",
                        fontFamily: "Poppins",
                      },
                    };
                  }
                }
              } else {
                // 黑白模式 (无填充 = 白色背景)
                styles.style = {
                  fill: "#ffffff",
                  stroke: "#1e293b",
                  lineWidth:
                    model.keyType === "pk" ||
                    model.nodeType === "entity" ||
                    model.nodeType === "relationship"
                      ? 2
                      : 1,
                  shadowBlur: 0,
                };
                if (model.isPlaceholder) {
                  styles.style.lineDash = [4, 4];
                  styles.style.stroke = "#64748b";
                  styles.labelCfg = {
                    style: {
                      fill: "#64748b",
                      fontWeight: "bold",
                      fontStyle: "italic",
                      fontFamily: "Poppins",
                    },
                  };
                } else {
                  styles.labelCfg = {
                    style: {
                      fill: "#1e293b",
                      fontWeight:
                        model.nodeType === "entity" || model.keyType === "pk"
                          ? "bold"
                          : "normal",
                      fontFamily: "Poppins",
                    },
                  };
                }
              }

              graphInstance.updateItem(node, styles);
            });

            // 刷新边
            const edges = graphInstance.getEdges();
            edges.forEach((edge) => {
              graphInstance.updateItem(edge, {
                style: {
                  stroke: "#000000",
                  lineWidth: 1.5,
                  endArrow: false,
                },
                labelCfg: {
                  style: {
                    fill: "#000000",
                    fontSize: 12,
                    background: {
                      fill: "#ffffff",
                      padding: [2, 4, 2, 4],
                      radius: 2,
                    },
                  },
                },
              });
            });

            graphInstance.paint();
            graphInstance.setAutoPaint(true);
          };

          const pendingRegenRef = useRef(false);

          // 监听语言切换事件（由顶部 vanilla 脚本派发）
          useEffect(() => {
            const onLang = (e) => {
              const nextLang = e.detail && e.detail.lang;
              if (!nextLang || nextLang === lang) return;
              // 如果用户尚未修改示例，则切换为目标语言的示例
              setInputText((prev) => {
                if (prev === I18N.zh.sample || prev === I18N.en.sample) {
                  pendingRegenRef.current = true;
                  return I18N[nextLang].sample;
                }
                return prev;
              });
              setLang(nextLang);
            };
            window.addEventListener("sql2er-lang", onLang);
            return () => window.removeEventListener("sql2er-lang", onLang);
          }, [lang]);

          // 语言切换后若示例已替换，则自动重新生成
          useEffect(() => {
            if (pendingRegenRef.current) {
              pendingRegenRef.current = false;
              handleGenerate();
            }
          }, [inputText]);

          // 监听着色状态变化
          useEffect(() => {
            // 恢复快照场景下，applied ref 已被同步设为目标值，则跳过此次副作用
            if (appliedIsColoredRef.current === isColored) return;
            appliedIsColoredRef.current = isColored;
            if (hasGraph && graphRef.current) {
              updateGraphStyles(graphRef.current, isColored);
            }
          }, [isColored, hasGraph]);

          // 监听 showComment 变化，重新生成图表（标签内容需要重渲染）
          useEffect(() => {
            if (appliedShowCommentRef.current === showComment) return;
            appliedShowCommentRef.current = showComment;
            if (hasGraph && lastInputRef.current) {
              handleGenerate();
            }
          }, [showComment]);

          // 监听 hideFields 变化：隐藏时直接移除属性节点，显示时根据
          // 当前实体位置计算最优属性位置后再加入，避免重新生成整张图
          useEffect(() => {
            if (appliedHideFieldsRef.current === hideFields) return;
            appliedHideFieldsRef.current = hideFields;
            if (!hasGraph || !graphRef.current || graphRef.current.destroyed) {
              return;
            }
            if (hideFields) {
              hideAttributesInGraph();
            } else {
              showAttributesInGraph();
            }
          }, [hideFields]);

          // 属性节点的隐藏 / 显示以及"加回来时的位置计算"封装在
          // window.AttributeLayout（js/attributeLayout.js）中。
          // 这里只保留绑定 React 状态 / ref 的薄包装。
          const hideAttributesInGraph = () => {
            // 节点集合发生增删，旧快照中的属性 ID 不再存在，清空历史
            historyRef.current.reset();
            window.AttributeLayout.hideAttributes(graphRef.current);
          };
          const showAttributesInGraph = () => {
            historyRef.current.reset();
            window.AttributeLayout.showAttributes({
              graph: graphRef.current,
              tables: tablesDataRef.current,
              labelMode: showComment ? "comment" : "name",
              isColored,
              updateStyles: updateGraphStyles,
            });
          };

          // 用 Exporter.buildExportSVG 拍一张矢量缩略图。
          // buildExportSVG 内部第一行就 graphRef.current.save() 同步取数据，
          // 之后才在临时 G6 中渲染并 setTimeout 1s 序列化 SVG —— 所以即使
          // 调用方紧接着 destroy 掉旧图，这条流水线已经持有数据副本，不会丢内容。
          const captureSvgThumbnail = () =>
            new Promise((resolve) => {
              if (
                !graphRef.current ||
                graphRef.current.destroyed ||
                !window.Exporter ||
                typeof window.Exporter.buildExportSVG !== "function"
              ) {
                resolve(null);
                return;
              }
              try {
                window.Exporter.buildExportSVG(
                  {
                    graphRef,
                    containerRef,
                    patchRelationshipLinkPoints,
                    G6: window.G6,
                    // 与 --color-bg-overlay 一致；让 SVG 底色矩形和暖色卡片融在一起。
                    // 用户下载 SVG/PNG 走另一条 buildExportSVG 调用，仍是默认白底。
                    backgroundFill: "#fdfcf8",
                  },
                  (err, result) => {
                    if (err || !result || !result.svgString) {
                      resolve(null);
                      return;
                    }
                    // SVG 里中文等多字节字符要先 UTF-8 再 base64
                    let dataUrl;
                    try {
                      dataUrl =
                        "data:image/svg+xml;base64," +
                        btoa(unescape(encodeURIComponent(result.svgString)));
                    } catch (_) {
                      // 兜底：URI 编码也能直接当 data URL 用
                      dataUrl =
                        "data:image/svg+xml;charset=utf-8," +
                        encodeURIComponent(result.svgString);
                    }
                    resolve(dataUrl);
                  },
                );
              } catch (_) {
                resolve(null);
              }
            });

          // 把当前图（可能即将被销毁）连同元信息一起入库。
          // 节点位置/标签同步采集；矢量缩略图与实际写入异步完成。
          // 返回 Promise，调用方 await 后才保证已落库 —— 这是历史面板能看到
          // 最新拖动结果的关键（之前 fire-and-forget 时 getAll 早于 put）。
          const persistSnapshot = (meta) =>
            new Promise((resolve) => {
              const graph = graphRef.current;
              if (!graph || graph.destroyed || !window.Snapshots) {
                resolve();
                return;
              }
              // 输入框还停留在示例（中/英文均算）时不写入历史 ——
              // 否则首次打开页面什么都没改也会有一条快照。
              const trimmedInput = String(
                (meta && meta.inputText) || "",
              ).trim();
              if (
                trimmedInput === I18N.zh.sample.trim() ||
                trimmedInput === I18N.en.sample.trim()
              ) {
                resolve();
                return;
              }
              const nodes = window.Snapshots.captureGraphSnapshot(graph);
              if (!nodes || nodes.length === 0) {
                resolve();
                return;
              }
              // 关键：在调用方还没 destroy 当前图之前同步触发 SVG 数据采集
              const thumbPromise = captureSvgThumbnail();
              thumbPromise.then((thumb) => {
                const writeWith = (existing) => {
                  // 数据没变化时跳过写入：恢复 / 打开历史面板都会触发一次
                  // persistSnapshot，若原封不动也刷新 updatedAt，会让历史排序
                  // 反复"乱跳"，用户感觉是 bug。
                  if (
                    existing &&
                    existing.isColored === !!meta.isColored &&
                    existing.showComment === !!meta.showComment &&
                    existing.hideFields === !!meta.hideFields &&
                    Array.isArray(existing.nodes) &&
                    existing.nodes.length === nodes.length &&
                    existing.nodes.every(
                      (p, i) =>
                        p.id === nodes[i].id &&
                        p.x === nodes[i].x &&
                        p.y === nodes[i].y &&
                        p.label === nodes[i].label,
                    )
                  ) {
                    resolve();
                    return;
                  }
                  window.Snapshots.put({
                    id: meta.id,
                    inputText: meta.inputText,
                    isColored: !!meta.isColored,
                    showComment: !!meta.showComment,
                    hideFields: !!meta.hideFields,
                    nodes,
                    thumbnail:
                      thumb || (existing && existing.thumbnail) || null,
                    createdAt:
                      existing && existing.createdAt
                        ? existing.createdAt
                        : Date.now(),
                    updatedAt: Date.now(),
                  })
                    .then(() => resolve())
                    .catch((e) => {
                      console.warn("snapshot put failed", e);
                      resolve();
                    });
                };
                window.Snapshots.get(meta.id)
                  .then(writeWith)
                  .catch(() => writeWith(null));
              });
            });

          const handleGenerate = (opts) => {
            opts = opts || {};
            // 允许调用方传入临时的覆盖值（用于"恢复历史"等流程），
            // 否则全部读取当前 React 状态
            const useInputText =
              opts.inputText !== undefined ? opts.inputText : inputText;
            const useIsColored =
              opts.isColored !== undefined ? opts.isColored : isColored;
            const useShowComment =
              opts.showComment !== undefined ? opts.showComment : showComment;
            const useHideFields =
              opts.hideFields !== undefined ? opts.hideFields : hideFields;
            // positionMap: Map<nodeId, {x, y, label?}>
            // 提供时跳过力布局，节点直接落在 map 指定的位置
            const positionMap = opts.positionMap || null;

            try {
              setError(null);
              setLoading(true);

              const trimmed = String(useInputText || "").trim();
              if (!trimmed) {
                setError(t.errEmpty);
                setLoading(false);
                return;
              }

              // === 销毁旧图前，先把当前图作为旧 input 的快照存起来 ===
              // 这样用户在"上一份输入"上拖动后的位置不会因为重新生成而丢失。
              // 仅当存在旧图且旧 input 已落档（lastInputRef 非空）时才保存。
              if (graphRef.current && lastInputRef.current) {
                if (pendingSaveTimerRef.current) {
                  clearTimeout(pendingSaveTimerRef.current);
                  pendingSaveTimerRef.current = null;
                }
                persistSnapshot({
                  id: window.Snapshots.hashInput(lastInputRef.current),
                  inputText: lastInputRef.current,
                  // 保存"旧图当时使用的设置"，所以这里仍用当前 React 状态
                  // （它们尚未被本次调用的 opts 覆盖）
                  isColored,
                  showComment,
                  hideFields,
                });
              }

              // 现在才把 lastInputRef 推进到本次输入
              lastInputRef.current = trimmed;

              let parsedData;

              // Try parsing as SQL first, if it fails (no tables), try DBML.
              parsedData = parseSQLTables(trimmed);

              if (parsedData.tables.length === 0) {
                parsedData = parseDBML(trimmed);
              }

              const { tables, relationships } = parsedData;

              if (tables.length === 0) {
                setError(t.errNoTable);
                setLoading(false);
                return;
              }

              // 缓存表数据，供隐藏/显示属性时无需重新生成图表即可重建属性
              tablesDataRef.current = tables;

              const { nodes, edges } = generateChenModelData(
                tables,
                relationships,
                useIsColored,
                useShowComment ? "comment" : "name",
                useHideFields,
              );

              if (positionMap) {
                // 恢复历史快照路径：直接按快照位置/标签覆盖
                nodes.forEach((n) => {
                  const p = positionMap.get(n.id);
                  if (p) {
                    if (typeof p.x === "number") n.x = p.x;
                    if (typeof p.y === "number") n.y = p.y;
                    if (p.label !== undefined && p.label !== null) {
                      n.label = p.label;
                    }
                  }
                });
              } else {
                // 初始位置：先把不同组件分开围绕中心，避免初始交叉
                applyInitialComponentPositions(
                  nodes,
                  edges,
                  containerRef.current,
                  0,
                );
              }

              // Clear previous graph completely
              if (graphRef.current) {
                graphRef.current.clear(); // 先清空数据
                graphRef.current.destroy(); // 再销毁图形
                graphRef.current = null; // 重置引用
              }
              // 重新生成图意味着节点集合可能完全不同，旧的快照不再适用
              historyRef.current.reset();

              // Create G6 graph
              // 恢复路径下不跑力布局（节点位置已经从快照里来）。
              const layoutCfg = positionMap
                ? undefined
                : {
                    type: "force2", // 使用 force2 布局
                    preventOverlap: true, // 确保节点不重叠
                    // 忽略文本长度，统一处理椭圆/菱形尺寸，避免因内容长短造成布局偏差
                    nodeSize: (node) => {
                      const uniformSizes = {
                        entity: 140,
                        relationship: 90,
                        attribute: 90,
                      };
                      return uniformSizes[node.nodeType] || 90;
                    },
                    nodeSpacing: 20, // 增加节点间距
                    linkDistance: 120, // 连线长度
                    // force2 特定参数
                    coulombDisScale: 0.005, // 库仑力的缩放因子
                    damping: 0.9, // 阻尼系数
                    maxSpeed: 1000, // 最大速度
                    minMovement: 0.5, // 最小移动量
                    interval: 0.02, // 迭代间隔
                    factor: 1, // 斥力因子
                    maxIteration: 800, // 最大迭代次数
                    animate: true, // 启用动画以显示布局过程
                    center: [containerRef.current.offsetWidth / 2, 300], // 布局中心
                    clustering: false, // 不使用聚类
                    tick: () => {
                      // 逐帧刷新以展现自动调整过程
                      graph.refreshPositions();
                    },
                    onLayoutEnd: () => {
                      // 先让互不相连的组件环绕分布，避免十字交叉
                      setTimeout(() => {
                        if (graphRef.current && !graphRef.current.destroyed) {
                          spreadDisconnectedComponents(graphRef.current, () => {
                            // 布局完成后平滑调整视图
                            smoothFitView(
                              graphRef.current,
                              800,
                              "easeOutCubic",
                            );
                          });
                        }
                      }, 30);
                    },
                  };
              const graph = new G6.Graph({
                container: containerRef.current,
                width: containerRef.current.offsetWidth,
                height: containerRef.current.offsetHeight,
                renderer: "canvas",
                background: "#ffffff",
                modes: {
                  default: [
                    "drag-node", // 1. 先判断拖节点
                    {
                      type: "drag-canvas",
                      allowDragOnItem: true, // 2. 允许在 item 上拖画布
                      enableOptimize: false, //    （性能优化，可留可删）
                      shouldBegin(e) {
                        // 3. 自定义开始条件
                        // e.item 为空 = 真空白处；组合 / 边也算"非 node"
                        return !e.item || e.item.getType() !== "node";
                      },
                    },
                    // 注：滚轮缩放 / Ctrl+滚轮旋转由下方自定义平滑处理器接管
                  ],
                },

                layout: layoutCfg,
                defaultNode: {
                  style: {
                    lineWidth: 2,
                    stroke: "#000",
                    fill: "#fff",
                  },
                  labelCfg: {
                    style: {
                      fill: "#000",
                      fontSize: 16, // 从12增加到16
                    },
                  },
                },
                defaultEdge: {
                  style: {
                    lineWidth: 1,
                    stroke: "#000000",
                  },
                  labelCfg: {
                    style: {
                      fill: "#000000",
                      fontSize: 14, // 从10增加到14
                      background: {
                        fill: "#fff",
                        padding: [2, 4, 2, 4],
                      },
                    },
                  },
                },
                edgeStateStyles: {
                  hover: {
                    stroke: "#1890ff",
                    lineWidth: 2,
                  },
                },
                defaultEdgeConfig: {
                  type: "line",
                },
                nodeStateStyles: {
                  hover: {
                    fill: "#e6f7ff",
                    stroke: "#1890ff",
                  },
                },
              });

              graphRef.current = graph;
              setHasGraph(true); // 标记图形已生成

              // Set data and render
              graph.data({ nodes, edges });
              graph.render();

              // 应用初始样式
              updateGraphStyles(graph, useIsColored);
              // 修正菱形连线计算
              patchRelationshipLinkPoints(graph);

              // 初始渲染后使用平滑动画调整视图
              setTimeout(() => {
                smoothFitView(graph, 600, "easeOutQuart");
              }, 200);

              // 等画面安顿好后再为本次输入存一份"初始/恢复后"快照。
              // 力布局有动画 + smoothFitView 总共 ~1s；这里给到 2.5s 比较稳妥。
              // 如果同一份输入的"销毁前"快照已经写过，会被这次覆盖（按主键 id）。
              if (pendingSaveTimerRef.current) {
                clearTimeout(pendingSaveTimerRef.current);
              }
              const saveDelay = positionMap ? 600 : 2500;
              const snapInputText = trimmed;
              const snapId = window.Snapshots.hashInput(snapInputText);
              pendingSaveTimerRef.current = setTimeout(() => {
                pendingSaveTimerRef.current = null;
                if (!graphRef.current || graphRef.current.destroyed) return;
                persistSnapshot({
                  id: snapId,
                  inputText: snapInputText,
                  isColored: useIsColored,
                  showComment: useShowComment,
                  hideFields: useHideFields,
                });
              }, saveDelay);

              // Enable interactions
              graph.on("node:mouseenter", (e) => {
                graph.setItemState(e.item, "hover", true);
              });

              graph.on("node:mouseleave", (e) => {
                graph.setItemState(e.item, "hover", false);
              });

              // 设置节点双击编辑功能（使用 Editor 模块）
              // 标签即将改变前先把当前状态推入撤销栈
              window.Editor.setupNodeDoubleClickEdit(
                graph,
                containerRef.current,
                {
                  onBeforeChange: () => historyRef.current.record(graph),
                },
              );

              // 自定义拖拽逻辑：拖动实体时带动相关属性一起移动
              let draggedEntity = null;
              let relatedAttributes = [];
              let dragStartPositions = new Map();

              graph.on("node:dragstart", (e) => {
                const node = e.item;
                const nodeModel = node.getModel();

                // 在任何节点开始被拖动前记录一次快照（用于撤销）
                historyRef.current.record(graph);

                // 只处理实体节点的拖拽
                if (nodeModel.type === "entity") {
                  draggedEntity = node;
                  relatedAttributes = [];
                  dragStartPositions.clear();

                  // 记录实体的初始位置
                  dragStartPositions.set(nodeModel.id, {
                    x: nodeModel.x,
                    y: nodeModel.y,
                  });

                  // 找到所有相关的属性节点
                  const allNodes = graph.getNodes();
                  allNodes.forEach((n) => {
                    const model = n.getModel();
                    if (
                      model.type === "attribute" &&
                      model.parentEntity === nodeModel.id
                    ) {
                      relatedAttributes.push(n);
                      // 记录属性的初始位置
                      dragStartPositions.set(model.id, {
                        x: model.x,
                        y: model.y,
                      });
                    }
                  });
                }
              });

              graph.on("node:drag", (e) => {
                const node = e.item;
                const nodeModel = node.getModel();

                // 只处理实体节点的拖拽
                if (nodeModel.type === "entity" && draggedEntity === node) {
                  const currentPos = { x: nodeModel.x, y: nodeModel.y };
                  const startPos = dragStartPositions.get(nodeModel.id);

                  if (startPos) {
                    // 计算实体的移动距离
                    const deltaX = currentPos.x - startPos.x;
                    const deltaY = currentPos.y - startPos.y;

                    // 同步移动所有相关的属性节点
                    relatedAttributes.forEach((attrNode) => {
                      const attrModel = attrNode.getModel();
                      const attrStartPos = dragStartPositions.get(attrModel.id);

                      if (attrStartPos) {
                        const newX = attrStartPos.x + deltaX;
                        const newY = attrStartPos.y + deltaY;

                        // 更新属性节点位置
                        graph.updateItem(attrNode, { x: newX, y: newY });
                      }
                    });
                  }
                }
              });

              graph.on("node:dragend", (e) => {
                const node = e.item;
                const nodeModel = node.getModel();

                // 清理拖拽状态
                if (nodeModel.type === "entity" && draggedEntity === node) {
                  draggedEntity = null;
                  relatedAttributes = [];
                  dragStartPositions.clear();
                }
              });

              // 自动布局说明：
              // 1. force布局会自动计算节点位置，避免重叠
              // 2. 不同类型节点有不同的排斥力和间距
              // 3. 连线长度根据关系类型自动调整
              // 4. 布局完成后自动调整视图大小
            } catch (e) {
              console.error("SQL Parsing error:", e);
              setError(`${t.errParse}: ${e.message}${t.errParseHint}`);
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            handleGenerate();

            // Cleanup on unmount
            return () => {
              if (graphRef.current) {
                graphRef.current.destroy();
              }
            };
          }, []);

          const handleResize = () => {
            if (graphRef.current && containerRef.current) {
              graphRef.current.changeSize(
                containerRef.current.offsetWidth,
                containerRef.current.offsetHeight,
              );
            }
          };

          // 导出SVG功能 - 使用 Exporter 模块
          const handleExportSVG = (onDone) => {
            if (!hasGraph || !graphRef.current) {
              onDone && onDone(new Error("no-graph"));
              return;
            }
            window.Exporter.exportSVG({
              graphRef,
              hasGraph,
              containerRef,
              onError: setError,
              onDone,
              patchRelationshipLinkPoints,
              G6: window.G6,
            });
          };

          const handleExportPNG = (onDone) => {
            if (!hasGraph || !graphRef.current) {
              onDone && onDone(new Error("no-graph"));
              return;
            }
            window.Exporter.exportPNG({
              graphRef,
              hasGraph,
              containerRef,
              onError: setError,
              onDone,
              patchRelationshipLinkPoints,
              G6: window.G6,
            });
          };

          const handleExportDrawio = (onDone) => {
            if (!hasGraph || !graphRef.current) {
              onDone && onDone(new Error("no-graph"));
              return;
            }
            window.Exporter.exportDrawio({
              graphRef,
              hasGraph,
              onError: setError,
              onDone,
              patchRelationshipLinkPoints,
            });
          };

          // 动效导出按钮：idle → open → loading → success → idle
          const [exportState, setExportState] = useState("idle");
          const [exportView, setExportView] = useState("idle"); // 错位显示的 view
          const [exportFmt, setExportFmt] = useState("PNG");
          const [exportProgress, setExportProgress] = useState(0);
          const exportBtnRef = useRef(null);
          const exportTimersRef = useRef([]);
          const clearExportTimers = () => {
            exportTimersRef.current.forEach(clearTimeout);
            exportTimersRef.current = [];
          };
          const addExportTimer = (fn, ms) => {
            const id = setTimeout(fn, ms);
            exportTimersRef.current.push(id);
            return id;
          };

          const toExportIdle = () => {
            clearExportTimers();
            setExportState("idle");
            setExportView(null);
            addExportTimer(() => setExportView("idle"), 240);
            setExportProgress(0);
          };
          const toExportOpen = () => {
            if (!hasGraph) return;
            clearExportTimers();
            setExportState("open");
            setExportView(null);
            addExportTimer(() => setExportView("open"), 220);
          };
          const toExportLoading = (fmt) => {
            clearExportTimers();
            setExportFmt(fmt);
            setExportState("loading");
            setExportView(null);
            setExportProgress(0);

            // phase.done 记录准备完成；triggerDownload 是"真正保存文件"的函数，
            // 由 exporter 在文件就绪时交回，我们在进度到 100% 的那一刻再调用它。
            const phase = {
              done: false,
              rampStartedAt: 0,
              triggerDownload: null,
            };
            const MIN_RAMP_MS = 260;

            const finalizeAfter = (wait) => {
              addExportTimer(() => {
                // 进度走满的同一瞬间触发实际下载
                if (phase.triggerDownload) {
                  try {
                    phase.triggerDownload();
                  } catch (e) {
                    setError(String(e && e.message ? e.message : e));
                  }
                }
                setExportProgress(100);
                addExportTimer(() => {
                  setExportState("success");
                  setExportView(null);
                  addExportTimer(() => setExportView("success"), 160);
                  addExportTimer(() => toExportIdle(), 2000);
                }, 240);
              }, wait);
            };

            const onDone = (err, download) => {
              if (err) {
                toExportIdle();
                return;
              }
              phase.done = true;
              phase.triggerDownload = download || null;
              // 如果视图还没出现，等视图出现的定时器里再判定完成
              if (phase.rampStartedAt === 0) return;
              const elapsed = performance.now() - phase.rampStartedAt;
              finalizeAfter(Math.max(0, MIN_RAMP_MS - elapsed));
            };

            // 切换到 loading view 并启动"爬升到 85%"的慢动画。
            // 若此时准备工作已完成，直接安排完成流程（保证进度条最少可见 MIN_RAMP_MS）。
            addExportTimer(() => {
              setExportView("loading");
              phase.rampStartedAt = performance.now();
              setExportProgress(85);
              if (phase.done) finalizeAfter(MIN_RAMP_MS);
            }, 160);

            // 触发实际导出"准备"工作（此时并不会下载文件）
            if (fmt === "PNG") handleExportPNG(onDone);
            else if (fmt === "XML") handleExportDrawio(onDone);
            else handleExportSVG(onDone);
          };

          // 点击按钮外部折叠；按 Esc 折叠
          useEffect(() => {
            if (exportState !== "open") return;
            const onDown = (e) => {
              if (!exportBtnRef.current) return;
              if (!exportBtnRef.current.contains(e.target)) toExportIdle();
            };
            const onKey = (e) => {
              if (e.key === "Escape") toExportIdle();
            };
            document.addEventListener("mousedown", onDown);
            document.addEventListener("keydown", onKey);
            return () => {
              document.removeEventListener("mousedown", onDown);
              document.removeEventListener("keydown", onKey);
            };
          }, [exportState]);

          useEffect(() => () => clearExportTimers(), []);

          const onExportBtnClick = (e) => {
            if (exportState === "idle") {
              toExportOpen();
              return;
            }
            if (exportState === "open") {
              const opt = e.target.closest && e.target.closest(".export-opt");
              if (opt) toExportLoading(opt.dataset.fmt);
            }
          };
          const onExportBtnKey = (e) => {
            if (
              (e.key === "Enter" || e.key === " ") &&
              exportState === "idle"
            ) {
              e.preventDefault();
              toExportOpen();
            }
          };

          useEffect(() => {
            window.addEventListener("resize", handleResize);
            return () => window.removeEventListener("resize", handleResize);
          }, []);

          // 全局快捷键：Ctrl/Cmd+Z 撤销，Ctrl/Cmd+Y 或 Ctrl/Cmd+Shift+Z 重做。
          // 在 CodeMirror、原生 input/textarea、双击编辑框内不拦截（让原生撤销生效）。
          useEffect(() => {
            const isEditableTarget = (el) => {
              if (!el) return false;
              const tag = el.tagName;
              if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") {
                return true;
              }
              if (el.isContentEditable) return true;
              if (el.closest && el.closest(".CodeMirror")) return true;
              return false;
            };

            const onKeyDown = (e) => {
              const mod = e.ctrlKey || e.metaKey;
              if (!mod) return;
              const key = e.key.toLowerCase();
              if (key !== "z" && key !== "y") return;
              if (isEditableTarget(e.target)) return;

              const graph = graphRef.current;
              if (!graph || graph.destroyed) return;

              const isRedo = key === "y" || (key === "z" && e.shiftKey);

              e.preventDefault();
              const onFinish = () => {
                // 动画结束后修正菱形连线端点（位置已就绪）
                try {
                  patchRelationshipLinkPoints(graph);
                } catch (_) {}
              };
              const action = isRedo ? "redo" : "undo";
              historyRef.current[action](graph, { onFinish });
            };

            window.addEventListener("keydown", onKeyDown);
            return () => window.removeEventListener("keydown", onKeyDown);
          }, []);

          // 自定义滚轮平滑缩放 / Ctrl+滚轮平滑旋转
          // - 仅改变节点位置，不旋转节点本身的形状/文字朝向
          // - 每格累积固定增量，用 rAF 做缓动动画，避免跳变
          useEffect(() => {
            const container = containerRef.current;
            if (!container) return;

            const ROT_STEP = Math.PI / 18; // 每格滚动累积 10°
            const ZOOM_STEP = 1.12; // 每格滚动缩放系数
            const ZOOM_MIN = 0.1;
            const ZOOM_MAX = 10;
            const SMOOTHING = 0.22; // 每帧吸收的比例（越大越快）
            const MIN_ANGLE = 0.0005; // 旋转收敛阈值（~0.03°）
            const MIN_ZOOM_DELTA = 0.0015; // 缩放收敛阈值（绝对值）

            let pendingAngle = 0;
            let rotPivot = null;

            let targetZoom = null;
            let zoomPivot = null;

            let rafId = null;

            // 旋转可能由若干 wheel 事件组成；把"一连串旋转"折成一次撤销步。
            // burst 在最后一次 wheel 后 ROT_BURST_GAP_MS 内视为同一次操作。
            let rotBurstActive = false;
            let rotBurstTimer = null;
            const ROT_BURST_GAP_MS = 600;

            const computeRotPivot = (graph) => {
              const nodes = graph.getNodes();
              if (nodes.length === 0) return null;
              let minX = Infinity;
              let minY = Infinity;
              let maxX = -Infinity;
              let maxY = -Infinity;
              nodes.forEach((node) => {
                const b = node.getBBox();
                if (b.minX < minX) minX = b.minX;
                if (b.minY < minY) minY = b.minY;
                if (b.maxX > maxX) maxX = b.maxX;
                if (b.maxY > maxY) maxY = b.maxY;
              });
              return { cx: (minX + maxX) / 2, cy: (minY + maxY) / 2 };
            };

            const applyRotation = (graph, angle, cx, cy) => {
              const cos = Math.cos(angle);
              const sin = Math.sin(angle);
              graph.getNodes().forEach((node) => {
                const m = node.getModel();
                const dx = m.x - cx;
                const dy = m.y - cy;
                m.x = cx + dx * cos - dy * sin;
                m.y = cy + dx * sin + dy * cos;
              });
              graph.refreshPositions();
            };

            const tick = () => {
              rafId = null;
              const graph = graphRef.current;
              if (!graph || graph.destroyed) {
                pendingAngle = 0;
                rotPivot = null;
                targetZoom = null;
                zoomPivot = null;
                return;
              }

              let more = false;

              // 旋转缓动
              if (rotPivot) {
                if (Math.abs(pendingAngle) >= MIN_ANGLE) {
                  const step = pendingAngle * SMOOTHING;
                  applyRotation(graph, step, rotPivot.cx, rotPivot.cy);
                  pendingAngle -= step;
                  more = true;
                } else {
                  pendingAngle = 0;
                  rotPivot = null;
                }
              }

              // 缩放缓动（围绕固定 pivot，保证该点视觉位置不漂移）
              if (targetZoom !== null && zoomPivot) {
                const cur = graph.getZoom();
                const diff = targetZoom - cur;
                if (Math.abs(diff) < MIN_ZOOM_DELTA) {
                  graph.zoomTo(targetZoom, zoomPivot);
                  targetZoom = null;
                  zoomPivot = null;
                } else {
                  graph.zoomTo(cur + diff * SMOOTHING, zoomPivot);
                  more = true;
                }
              }

              if (more) rafId = requestAnimationFrame(tick);
            };

            const ensureRaf = () => {
              if (rafId === null) rafId = requestAnimationFrame(tick);
            };

            const onWheel = (e) => {
              const graph = graphRef.current;
              if (!graph || graph.destroyed) return;

              // 阻断浏览器默认缩放 / 原生滚动
              e.preventDefault();
              e.stopPropagation();

              if (e.ctrlKey) {
                if (graph.getNodes().length === 0) return;
                if (!rotPivot) rotPivot = computeRotPivot(graph);
                if (!rotPivot) return;
                // 在一次旋转 burst 的最开始拍一次快照（用于撤销整段旋转）
                if (!rotBurstActive) {
                  historyRef.current.record(graph);
                  rotBurstActive = true;
                }
                if (rotBurstTimer !== null) clearTimeout(rotBurstTimer);
                rotBurstTimer = setTimeout(() => {
                  rotBurstActive = false;
                  rotBurstTimer = null;
                }, ROT_BURST_GAP_MS);
                pendingAngle += (e.deltaY > 0 ? 1 : -1) * ROT_STEP;
              } else {
                // 使用当前鼠标位置作为缩放锚点；连续滚动覆盖锚点到最新鼠标位置
                // 注：graph.zoomTo 的 center 需要画布坐标（canvas-local 像素），
                // 必须用 graph.get("canvas").getPointByClient，
                // 而不是 graph.getPointByClient（后者返回的是图坐标）。
                const canvas = graph.get("canvas");
                const p = canvas.getPointByClient(e.clientX, e.clientY);
                zoomPivot = { x: p.x, y: p.y };
                const base = targetZoom !== null ? targetZoom : graph.getZoom();
                const factor = e.deltaY > 0 ? 1 / ZOOM_STEP : ZOOM_STEP;
                targetZoom = Math.max(
                  ZOOM_MIN,
                  Math.min(ZOOM_MAX, base * factor),
                );
              }

              ensureRaf();
            };

            container.addEventListener("wheel", onWheel, {
              capture: true,
              passive: false,
            });
            return () => {
              container.removeEventListener("wheel", onWheel, {
                capture: true,
              });
              if (rafId !== null) cancelAnimationFrame(rafId);
              if (rotBurstTimer !== null) clearTimeout(rotBurstTimer);
            };
          }, []);

          // 切换背景显示
          const handleToggleBackground = () => {
            setShowBackground(!showBackground);
          };

          // 强制对齐：忽略椭圆，主链水平，支线递归均分
          const handleForceAlign = () => {
            if (!graphRef.current || graphRef.current.destroyed) return;
            historyRef.current.record(graphRef.current);
            const containerWidth = containerRef.current?.offsetWidth || 1200;
            forceAlignLayout(graphRef.current, containerWidth);
          };

          // 环绕排布：让属性均匀围绕实体，同时可移动实体以满足关系距离
          const handleArrangeLayout = () => {
            if (!graphRef.current || graphRef.current.destroyed) return;
            historyRef.current.record(graphRef.current);
            arrangeLayout(graphRef.current);
          };

          // ─── 生成历史 ───────────────────────────────────────────
          // 打开历史面板：
          //  1) 立刻用 IndexedDB 里的现有数据把面板撑起来（点击不卡）；
          //  2) 在后台为当前画面拍一张矢量快照、写库；写完再静默刷新一次列表。
          // 这样用户拖动后点开面板，先看到上次的状态，约 1s 后卡片自动换成
          // 包含最新位置的缩略图 —— 不用关掉再开。
          const sortByUpdated = (xs) =>
            xs.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

          const openHistory = async () => {
            if (!window.Snapshots) return;
            try {
              const items = await window.Snapshots.getAll();
              setHistoryItems(sortByUpdated(items));
            } catch (e) {
              console.warn("snapshots getAll failed", e);
              setHistoryItems([]);
            }
            setHistoryOpen(true);

            if (graphRef.current && lastInputRef.current) {
              persistSnapshot({
                id: window.Snapshots.hashInput(lastInputRef.current),
                inputText: lastInputRef.current,
                isColored,
                showComment,
                hideFields,
              }).then(async () => {
                try {
                  const fresh = await window.Snapshots.getAll();
                  setHistoryItems(sortByUpdated(fresh));
                } catch (_) {}
              });
            }
          };

          const closeHistory = () => setHistoryOpen(false);

          const restoreFromSnapshot = (snap) => {
            if (!snap || !snap.nodes) return;
            // 同步把 applied refs 推到目标值，让 useEffect 看到"无变化"从而不会
            // 触发自动重新生成 / 样式刷新。
            appliedShowCommentRef.current = !!snap.showComment;
            appliedHideFieldsRef.current = !!snap.hideFields;
            appliedIsColoredRef.current = !!snap.isColored;

            setInputText(snap.inputText);
            setIsColored(!!snap.isColored);
            setShowComment(!!snap.showComment);
            setHideFields(!!snap.hideFields);

            const positionMap = new Map();
            snap.nodes.forEach((n) => {
              positionMap.set(n.id, { x: n.x, y: n.y, label: n.label });
            });

            // 直接以快照内容重新生成；位置/标签由 positionMap 覆盖
            handleGenerate({
              inputText: snap.inputText,
              isColored: !!snap.isColored,
              showComment: !!snap.showComment,
              hideFields: !!snap.hideFields,
              positionMap,
            });

            setHistoryOpen(false);
          };

          const deleteSnapshot = async (id) => {
            try {
              await window.Snapshots.deleteById(id);
              setHistoryItems((prev) => prev.filter((x) => x.id !== id));
            } catch (e) {
              console.warn("snapshot delete failed", e);
            }
          };

          // 关闭历史面板的快捷键：Esc
          useEffect(() => {
            if (!historyOpen) return;
            const onKey = (e) => {
              if (e.key === "Escape") closeHistory();
            };
            window.addEventListener("keydown", onKey);
            return () => window.removeEventListener("keydown", onKey);
          }, [historyOpen]);

          // 历史面板开着时给 body 加标记，CSS 据此把右上角的语言胶囊隐去
          // —— 它的 z-index 比覆盖层高，否则会浮在卡片轨道之上。
          useEffect(() => {
            if (historyOpen) {
              document.body.classList.add("history-open");
            } else {
              document.body.classList.remove("history-open");
            }
            return () => document.body.classList.remove("history-open");
          }, [historyOpen]);

          // 时间戳格式化（按当前语言显示本地化的"几秒前 / 时间戳"）
          const formatTimestamp = (ts) => {
            if (!ts) return "";
            try {
              const d = new Date(ts);
              const diff = Date.now() - ts;
              const min = Math.floor(diff / 60000);
              if (min < 1) return lang === "zh" ? "刚刚" : "just now";
              if (min < 60) {
                return lang === "zh" ? `${min} 分钟前` : `${min} min ago`;
              }
              const hr = Math.floor(min / 60);
              if (hr < 24) {
                return lang === "zh" ? `${hr} 小时前` : `${hr} hr ago`;
              }
              return d.toLocaleString(lang === "zh" ? "zh-CN" : "en-US", {
                month: "short",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
              });
            } catch (_) {
              return "";
            }
          };

          return (
            <>
              <div className="main-content">
                <div className="input-section">
                  <div className="card">
                    <div
                      className="card-header"
                      style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                      }}
                    >
                      <h2 className="card-title">
                        <span style={{ fontSize: "1.5rem" }}>📄</span>
                        {t.cardInputTitle}
                      </h2>
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: "10px",
                        }}
                      >
                        <span className="inline-label">{t.showComment}</span>
                        <Switch
                          checked={showComment}
                          onChange={setShowComment}
                          size="small"
                        />
                      </div>
                    </div>
                    <div className="card-content">
                      <div
                        style={{
                          height: "480px",
                          display: "flex",
                          flexDirection: "column",
                        }}
                      >
                        <CodeEditor
                          value={inputText}
                          onChange={setInputText}
                          placeholder={t.editorPlaceholder}
                        />
                      </div>
                      <div className="button-group">
                        <button
                          className="btn btn-primary"
                          onClick={handleGenerate}
                          disabled={loading}
                        >
                          {loading ? (
                            <div
                              className="spinner"
                              style={{ width: 20, height: 20, borderWidth: 2 }}
                            ></div>
                          ) : t.btnGenerate === t.btnGenerateShort ? (
                            // 长短标签一致（如英文）时不需要切换动效，直接渲染文本
                            t.btnGenerate
                          ) : (
                            <span
                              className="btn-primary-label-stack"
                              data-compact={exportState !== "idle"}
                            >
                              <span className="label-long">
                                {t.btnGenerate}
                              </span>
                              <span className="label-short">
                                {t.btnGenerateShort}
                              </span>
                            </span>
                          )}
                        </button>
                        <div className="export-btn-wrap">
                          <button
                            ref={exportBtnRef}
                            type="button"
                            className="export-btn"
                            data-state={exportState}
                            disabled={!hasGraph}
                            onClick={onExportBtnClick}
                            onKeyDown={onExportBtnKey}
                            aria-label={t.btnExportLabel}
                          >
                            <div
                              className="export-progress"
                              style={{
                                width: `${exportProgress}%`,
                                transitionDuration:
                                  exportProgress >= 100
                                    ? "220ms"
                                    : exportProgress > 0
                                      ? "2400ms"
                                      : "300ms",
                                transitionTimingFunction:
                                  exportProgress >= 100
                                    ? "cubic-bezier(0.2, 0.7, 0.2, 1)"
                                    : exportProgress > 0
                                      ? "cubic-bezier(0, 0.6, 0.2, 1)"
                                      : "cubic-bezier(0, 0, 0.2, 1)",
                              }}
                            />

                            <div
                              className={`export-view export-view-idle${exportView === "idle" ? " is-on" : ""}`}
                            >
                              <span className="idle-label">
                                {t.btnExportLabel}
                              </span>
                              <svg
                                className="arrow-icon"
                                viewBox="0 0 14 14"
                                width="16"
                                height="16"
                                fill="none"
                                stroke="currentColor"
                                strokeWidth="1.5"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                              >
                                <path d="M7 2v7.5m0 0l-3-3m3 3l3-3M2.5 12h9" />
                              </svg>
                            </div>

                            <div
                              className={`export-view export-view-open${exportView === "open" ? " is-on" : ""}`}
                            >
                              <div className="export-opt" data-fmt="PNG">
                                <span className="export-opt-label">PNG</span>
                              </div>
                              <div className="export-sep" />
                              <div className="export-opt" data-fmt="XML">
                                <span className="export-opt-label">XML</span>
                              </div>
                              <div className="export-sep" />
                              <div className="export-opt" data-fmt="SVG">
                                <span className="export-opt-label">SVG</span>
                              </div>
                              <div className="export-sep" />
                              <div
                                className="export-cancel"
                                onClick={(e) => {
                                  e.stopPropagation();
                                  toExportIdle();
                                }}
                                aria-label="Cancel"
                              >
                                <svg
                                  xmlns="http://www.w3.org/2000/svg"
                                  width="16"
                                  height="16"
                                  viewBox="0 0 24 24"
                                  fill="none"
                                  stroke="currentColor"
                                  strokeWidth="2.5"
                                  strokeLinecap="round"
                                  strokeLinejoin="round"
                                >
                                  <line x1="18" x2="6" y1="6" y2="18" />
                                  <line x1="6" x2="18" y1="6" y2="18" />
                                </svg>
                              </div>
                            </div>

                            <div
                              className={`export-view export-view-loading${exportView === "loading" ? " is-on" : ""}`}
                            >
                              <svg
                                className="export-spinner"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                strokeWidth="3"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                              >
                                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                              </svg>
                              <span className="loading-label">
                                {t.exportGenerating} {exportFmt}...
                              </span>
                            </div>

                            <div
                              className={`export-view export-view-success${exportView === "success" ? " is-on" : ""}`}
                            >
                              <svg
                                className="check-icon"
                                viewBox="0 0 14 14"
                                fill="none"
                                stroke="currentColor"
                                strokeWidth="2"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                              >
                                <path d="M2.5 7.2l3 3 6-6" />
                              </svg>
                              <span className="success-label">
                                {t.exportSaved}
                              </span>
                            </div>
                          </button>
                        </div>
