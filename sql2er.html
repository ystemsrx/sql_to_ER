                      </div>
                    </div>
                  </div>
                </div>

                <div className="output-section">
                  <div className="card">
                    <div
                      className="card-header"
                      style={{ flexWrap: "wrap", gap: "16px", height: "auto" }}
                    >
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: "24px",
                          flex: 1,
                          minWidth: "300px",
                        }}
                      >
                        <h2
                          className="card-title"
                          style={{ whiteSpace: "nowrap" }}
                        >
                          <span style={{ fontSize: "1.5rem" }}>🎨</span>
                          {t.cardPreviewTitle}
                        </h2>

                        <div
                          style={{
                            display: "flex",
                            gap: "8px",
                            alignItems: "center",
                            flexWrap: "wrap",
                          }}
                        >
                          <div
                            className="legend-item"
                            style={{ padding: "4px 10px", fontSize: "0.8rem" }}
                          >
                            <div
                              style={{
                                width: "10px",
                                height: "10px",
                                borderRadius: "3px",
                                background: isColored ? "#e0f2fe" : "#fff",
                                border: isColored
                                  ? "2px solid #0ea5e9"
                                  : "2px solid #1e293b",
                              }}
                            ></div>
                            <span>{t.legendEntity}</span>
                          </div>
                          <div
                            className="legend-item"
                            style={{ padding: "4px 10px", fontSize: "0.8rem" }}
                          >
                            <div
                              style={{
                                width: "10px",
                                height: "10px",
                                transform: "rotate(45deg)",
                                background: isColored ? "#f5f3ff" : "#fff",
                                border: isColored
                                  ? "2px solid #8b5cf6"
                                  : "2px solid #1e293b",
                              }}
                            ></div>
                            <span style={{ marginLeft: "4px" }}>
                              {t.legendRelation}
                            </span>
                          </div>
                          <div
                            className="legend-item"
                            style={{ padding: "4px 10px", fontSize: "0.8rem" }}
                          >
                            <div
                              style={{
                                width: "10px",
                                height: "10px",
                                borderRadius: "50%",
                                background: isColored ? "#fff" : "#fff",
                                border: isColored
                                  ? "2px solid #94a3b8"
                                  : "1px solid #1e293b",
                              }}
                            ></div>
                            <span>{t.legendAttribute}</span>
                          </div>
                          <div
                            className="legend-item"
                            style={{ padding: "4px 10px", fontSize: "0.8rem" }}
                          >
                            <div
                              style={{
                                width: "10px",
                                height: "10px",
                                borderRadius: "50%",
                                background: isColored ? "#ecfdf5" : "#fff",
                                border: isColored
                                  ? "2px solid #10b981"
                                  : "2px solid #1e293b",
                              }}
                            ></div>
                            <span style={{ fontWeight: 600 }}>
                              {t.legendPk}
                            </span>
                          </div>
                        </div>
                      </div>

                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: "16px",
                          marginLeft: "auto",
                        }}
                      >
                        <button
                          className="btn btn-sm btn-accent"
                          onClick={handleArrangeLayout}
                          disabled={!hasGraph || loading}
                        >
                          {t.btnSmartLayout}
                        </button>
                        <button
                          className="btn btn-sm btn-accent"
                          onClick={handleForceAlign}
                          disabled={!hasGraph || loading}
                        >
                          {t.btnForceAlign}
                        </button>
                      </div>
                    </div>

                    <div
                      className="card-content"
                      style={{
                        position: "relative",
                        padding: 0,
                        display: "flex",
                        flexDirection: "column",
                        height: "100%",
                      }}
                    >
                      {error && (
                        <div
                          className="error-message"
                          style={{ margin: "20px" }}
                        >
                          ⚠️ {error}
                        </div>
                      )}

                      <div
                        className={`diagram-container ${showBackground ? "" : "no-grid"}`}
                        style={{ border: "none", borderRadius: 0 }}
                      >
                        <div
                          className="background-toggle"
                          onClick={handleToggleBackground}
                          title={showBackground ? t.tipHideBg : t.tipShowBg}
                        >
                          <i
                            className={`fa-solid ${showBackground ? "fa-eye" : "fa-eye-slash"}`}
                          ></i>
                        </div>
                        <div
                          className={`colorize-toggle ${isColored ? "active" : ""}`}
                          onClick={() => setIsColored(!isColored)}
                          title={isColored ? t.tipColorOff : t.tipColorOn}
                        >
                          <i className="fa-solid fa-palette"></i>
                        </div>
                        <div
                          className={`attrs-toggle ${hideFields ? "active" : ""}`}
                          onClick={() => setHideFields(!hideFields)}
                          title={hideFields ? t.tipShowAttrs : t.tipHideAttrs}
                        >
                          <i className="fa-solid fa-list-ul"></i>
                        </div>
                        <div
                          className="history-toggle"
                          onClick={openHistory}
                          title={t.tipHistory}
                        >
                          <i className="fa-solid fa-clock-rotate-left"></i>
                        </div>
                        {loading && (
                          <div className="loading-overlay">
                            <div className="spinner"></div>
                          </div>
                        )}
                        <div
                          ref={containerRef}
                          style={{
                            width: "100%",
                            height: "100%",
                            position: "relative",
                          }}
                        />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <HistoryOverlay
                open={historyOpen}
                items={historyItems}
                t={t}
                onClose={closeHistory}
                onRestore={restoreFromSnapshot}
                onDelete={deleteSnapshot}
                formatTimestamp={formatTimestamp}
              />
            </>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(
          <React.StrictMode>
            <App />
          </React.StrictMode>,
        );
      });
    </script>
  </body>
</html>
