<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL/DBML2ER</title>

    <!-- Anthropic 风格：先字体，后 base -->
    <link rel="stylesheet" href="./assets/fonts/fonts.css" />
    <link rel="stylesheet" href="./assets/base.css" />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <a
      href="https://github.com/ystemsrx/sql_to_ER"
      class="github-corner"
      aria-label="View source on GitHub"
      target="_blank"
      rel="noopener noreferrer"
    >
      <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
        <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
        <path
          d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
          fill="currentColor"
          class="octo-arm"
        ></path>
        <path
          d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
          fill="currentColor"
          class="octo-body"
        ></path>
      </svg>
    </a>
    <div
      class="lang-switch"
      data-lang="zh"
      role="tablist"
      aria-label="切换语言 / Switch language"
    >
      <button
        type="button"
        class="lang-option is-active"
        data-lang="zh"
        role="tab"
        aria-selected="true"
      >
        中
      </button>
      <button
        type="button"
        class="lang-option"
        data-lang="en"
        role="tab"
        aria-selected="false"
      >
        EN
      </button>
      <span class="lang-thumb" aria-hidden="true"></span>
    </div>

    <div class="app-container lang-fade-target">
      <div class="header">
        <span class="header-eyebrow" data-i18n="eyebrow"
          >Chen Model · Entity-Relationship</span
        >
        <h1 data-i18n-html="title">SQL / DBML 转 <em>ER 图</em> 生成器</h1>
        <p data-i18n="subtitle">
          把建表语句或 DBML 一键渲染为 Chen 模型实体-关系图
        </p>
        <p class="header-hint" data-i18n-html="hint">
          <span class="header-hint-row"
            >双击编辑节点 · 滚轮缩放 · Ctrl+滚轮旋转 · 拖拽排布</span
          >
          <span class="header-hint-row header-hint-row--secondary"
            >Ctrl+Z 撤销 / Ctrl+Y 重做</span
          >
        </p>
      </div>

      <div id="root"></div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
