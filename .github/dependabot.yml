version: 2
updates:
  # 应用代码依赖：每月打包成少量 PR；跳过 patch 级（过小）更新，进一步降噪
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    # @antv/g6 5.x is a full API rewrite (different mount API, layout system,
    # node registration). Pin to 4.x and only allow patch/minor bumps until
    # we deliberately port the codebase.
    ignore:
      - dependency-name: "@antv/g6"
        update-types: ["version-update:semver-major"]
      # 跳过所有 patch 级版本更新（过小、噪音大）。注意：以 patch 形式发布的
      # 安全更新也会被一并抑制——如需更细，可改成只对 dev / 类型依赖跳过。
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      # React 一组：核心 + 类型一起升，避免 react / react-dom / @types/react 错配
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      # CodeMirror 6 子包之间版本必须互相兼容，分组升级最稳
      codemirror:
        patterns:
          - codemirror
          - "@codemirror/*"
          - "@lezer/*"
      # 工具链统一升
      tooling:
        patterns:
          - vite
          - "@vitejs/*"
          - vitest
          - typescript

  # GitHub Actions 自身：保证 actions/checkout、setup-node 这类基础动作不锈
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
      include: scope
    # action 也跳过 patch 级更新
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      actions:
        patterns:
          - "*"
